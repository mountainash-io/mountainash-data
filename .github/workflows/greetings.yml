name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Woohoo! You have submitted your first issue to this repository!"
        pr-message: "Congratulations on submitting your first pull request to this repository. One begets two, begets three..."
