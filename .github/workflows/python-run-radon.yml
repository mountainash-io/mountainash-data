name: Radon Complexity Checks

on:
  pull_request:
    paths:
      - "src/mountainash_data/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  complexity-checks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: pip install hatch

      - name: Create virtual environment
        run: hatch env create radon

      - name: Complexity checks with radon - cc
        run: hatch run radon:radon-cc

      - name: Complexity checks with radon - mi
        run: hatch run radon:radon-mi
