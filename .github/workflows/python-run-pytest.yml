name: Pytest

on: 
  pull_request_target:
    paths:
      - 'src/mountainash_data/**'          
  workflow_dispatch:

jobs:

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: [ "3.12"] #, "3.8", "3.9", "3.10","3.11",]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Current Branch
      - name: Get branch name
        shell: bash
        run: echo "BRANCH_NAME=$(echo ${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}})" >> $GITHUB_ENV

      ###### MtAsh DEPENDENCIES ######

      - name: Set Repo - mountainash-auth-settings
        env:
          REPO: mountainash-auth-settings
        run: echo "REPO=$REPO" >> $GITHUB_ENV

      - name: Determine Branch to Use - ${{ env.REPO }}
        env:
          TOKEN: ${{ secrets.CLONE_PRIVATE_REPOS_TOKEN }}
          # REPO: ${{ env.REPO }}
          TARGET_BRANCH_NAME: ${{ env.BRANCH_NAME }} # or set your branch name here
          DEFAULT_BRANCH_NAME: main # or set your branch name here
        run: |
          BRANCH_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$USERNAME/$REPO/branches/$TARGET_BRANCH_NAME")

          # If the branch exists (HTTP status code 200), use the target branch; otherwise, use the default branch
          if [ $BRANCH_EXISTS -eq 200 ]; then
            BRANCH_TO_USE=$TARGET_BRANCH_NAME
          else
            BRANCH_TO_USE=$DEFAULT_BRANCH_NAME
          fi
          echo "BRANCH_TO_USE=$BRANCH_TO_USE" >> $GITHUB_ENV

      - name: Checkout matching branch - ${{ env.REPO }}
        uses: actions/checkout@v4
        with:
          repository: mountainash-io/${{ env.REPO }}
          ref: ${{ env.BRANCH_TO_USE }}
          token: ${{ secrets.CLONE_PRIVATE_REPOS_TOKEN }}
          path: temp/${{ env.REPO }}
          fetch-depth: 1


