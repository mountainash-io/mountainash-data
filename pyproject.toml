[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mountainash_data"
dynamic = ["version"]
description = 'Mountain Ash - Data'
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = []
authors = [
  { name = "Nathaniel Ramm", email = "nathaniel.ramm@discretedatascience.com" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = [
  "universal_pathlib",
  # ibis-framework[duckdb,examples,polars,pandas,sqlite,postgres] >= 9.0.0
  "ibis-framework[polars,pandas,sqlite] >= 9.0.0",
  "pandas",
  "polars",
  "pyarrow",
  "openlineage-python"
]


[project.urls]
Documentation = "https://github.com/mountainash-io/mountainash-data#readme"
Issues = "https://github.com/mountainash-io/mountainash-data/issues"
Source = "https://github.com/mountainash-io/mountainash-data"

[tool.hatch.metadata]
allow-direct-references = true


[tool.hatch.version]
path = "src/mountainash_data/__version__.py"


# Pytest and Test Coverage - Githubb
[[tool.hatch.envs.test_github.matrix]]
python = ["3.12","3.11", "3.10" ] # "3.8", "3.9","3.9",

[tool.hatch.envs.test_github]
dependencies = [
  "coverage[toml]>=6.5",
  "pytest",
  "pytest_check",

  "mountainash_settings @ {root:uri}/tmp/mountainash-settings",
  "mountainash_constants @ {root:uri}/tmp/mountainash-constants",
  # "mountainash_data @ {root:uri}/tmp/mountainash-data",
  "mountainash_auth_settings @ {root:uri}/tmp/mountainash-auth-settings",
  # "mountainash_utils @ {root:uri}/tmp/mountainash-utils",
  "mountainash_utils_ssh @ {root:uri}/tmp/mountainash-utils-ssh",
  "mountainash_utils_files @ {root:uri}/tmp/mountainash-utils-files",
  "mountainash_utils_dataclasses @ {root:uri}/tmp/mountainash-utils-dataclasses",
]
[tool.hatch.envs.test_github.scripts]
test = "pytest"
test-cov = "coverage run -m pytest"
test-xml = "coverage xml"
cov-report = [
  "- coverage combine",
  "coverage report",
]
cov = [
  "test-cov",
  "cov-report",
  "test-xml",
]
cov-html = [
  "coverage html",
]

# Pytest and Test Coverage
[[tool.hatch.envs.test.matrix]]
python = ["3.11", "3.12",  "3.10" ] # "3.8", "3.9","3.9",

[tool.hatch.envs.test]
dependencies = [
  "coverage[toml]>=6.5",
  "pytest",
  "pytest_check",

  "mountainash_settings @ {root:uri}/../mountainash-settings",
  "mountainash_constants @ {root:uri}/../mountainash-constants",
  # "mountainash_data @ {root:uri}/../mountainash-data",
  "mountainash_auth_settings @ {root:uri}/../mountainash-auth-settings",
  # "mountainash_utils @ {root:uri}/../mountainash-utils",
  "mountainash_utils-ssh @ {root:uri}/../mountainash-utils-ssh",
  "mountainash_utils-files @ {root:uri}/../mountainash-utils-files",
  "mountainash_utils_dataclasses @ {root:uri}/../mountainash-utils-dataclasses",


]
[tool.hatch.envs.test.scripts]
test = "pytest"
test-cov = "coverage run -m pytest"
test-xml = "coverage xml"
cov-report = [
  "- coverage combine",
  "coverage report",
]
cov = [
  "test-cov",
  "cov-report",
  "test-xml",
]
cov-html = [
  "coverage html",
]


# Ruff Linting Checks
[tool.hatch.envs.ruff]
dependencies = [
  "ruff"
]
[tool.hatch.envs.ruff.scripts]
check = "ruff check ./src"

# Radon Complexity Checks
[tool.hatch.envs.radon]
dependencies = [
  "radon",
]
[tool.hatch.envs.radon.scripts]
radon-cc = "radon cc . -nd"
radon-mi = "radon mi . -nd"

# Mypy Type checks
[tool.hatch.envs.types]
dependencies = [
  "mypy>=1.0.0",
]
[tool.hatch.envs.types.scripts]
check = "mypy --install-types --non-interactive {args:src/mountainash_data tests}"

# Coverage Parameters
[tool.coverage.run]
source_pkgs = ["mountainash_data", "tests"]
branch = true
parallel = true
omit = [
  "src/mountainash_data/__version__.py",
]

[tool.coverage.paths]
mountainash_data = ["src/mountainash_data", "*/mountainash-data/src/mountainash_data"]
tests = ["tests", "*/mountainash-data/tests"]

[tool.coverage.report]
exclude_lines = [
  "no cov",
  "if __name__ == .__main__:",
  "if TYPE_CHECKING:",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mountainash_data"]