[pytest]
asyncio_default_fixture_loop_scope = function

json_report = true
json_report_file = test_report.json
json_report_indent = 4
json_report_omit = variables paths logs

# Directories that pytest should search for tests in.
testpaths = tests

# Files that pytest should discover.
python_files = test_*.py
python_classes = Test*


# Functions and methods that pytest should discover.
python_functions = test_*

# Display a verbose summary of the test results at the end of the run.
addopts = --strict-markers --tb=short

# Marker definitions
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take longer to run
    performance: Performance and benchmark tests
    smoke: Quick tests to verify basic functionality
    regression: Tests for regression issues
    api: API-related tests
    data: Data processing tests
    parametrize: Tests using parametrization

# Capture stdout and stderr only when a test fails.
# log_cli_level = ERROR
# log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
# log_cli_date_format = %Y-%m-%d %H:%M:%S
log_cli = false
; log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Fail the test run after the first failure.
# Uncomment the line below if you want this behavior.
# addopts = --maxfail=1

# Generate a detailed report of all (or just failed) test cases.
# Uncomment to enable.
# addopts = --detailed-report

# Display markers in the test output.
# Uncomment to enable.
# addopts = -m "not slow"

# Markers that are recognized by pytest.
# This is just an example. You can define your own markers for various purposes.
# markers =
#    slow: marks tests as slow (deselect with '-m "not slow"')
